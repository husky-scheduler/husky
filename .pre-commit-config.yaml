repos:
  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        types: [go]

      - id: go-fmt
        name: gofmt check
        entry: bash -c 'files=$(gofmt -l .); [ -z "$files" ] || (echo "gofmt issues in: $files" && exit 1)'
        language: system
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run ./...
        language: system
        pass_filenames: false
        types: [go]
