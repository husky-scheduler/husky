name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: ${{ startsWith(github.ref, 'refs/tags/v') && 'release --clean' || 'release --snapshot --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}

  publish-homebrew-tap:
    name: Publish Homebrew tap
    runs-on: ubuntu-latest
    needs: goreleaser
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download checksums asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern checksums.txt \
            --dir dist

      - name: Render Homebrew formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          ./scripts/render_homebrew_formula.sh "$version" dist/checksums.txt packaging/homebrew/husky.rb packaging/homebrew/husky.rb.tmpl

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: husky-scheduler/homebrew-husky
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-husky

      - name: Update tap formula
        run: |
          mkdir -p homebrew-husky/Formula
          cp packaging/homebrew/husky.rb homebrew-husky/Formula/husky.rb

      - name: Commit and push tap update
        working-directory: homebrew-husky
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/husky.rb
          if git diff --cached --quiet; then
            echo "No Homebrew changes to publish"
            exit 0
          fi
          git commit -m "husky ${VERSION}"
          git push
