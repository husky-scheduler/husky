run:
  timeout: 5m
  go: "1.24"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - godot
    - noctx
    - bodyclose
    - exhaustive
    - gocritic
    - nilerr
    - revive

linters-settings:
  goimports:
    local-prefixes: github.com/husky-scheduler/husky
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"

issues:
  exclude-rules:
    # Test files can use dot imports and skip godoc
    - path: _test\.go
      linters:
        - godot
        - revive
        - noctx
        - bodyclose
    - path: internal/store/store_config\.go
      linters:
        - revive
